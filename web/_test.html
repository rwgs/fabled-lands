<!doctype html><html><head><meta charset="utf-8"><title>FL tests</title></head>
<body><pre id="results">running…</pre>
<script type="module">
import * as data from './js/data.js';
import { GameState } from './js/state.js';
import * as eng from './js/engine.js';
import { Story } from './js/render.js';

const out = [];
let pass = 0, fail = 0;
function ok(name, cond, extra='') { if (cond) { pass++; out.push('PASS ' + name); } else { fail++; out.push('FAIL ' + name + (extra?(' :: '+extra):'')); } }
function parse(xml){ return data.parseXml(xml); }

async function run() {
  try {
    await data.loadMeta();
    ok('meta books=6', data.availableBooks().length === 6);

    // adventurers
    const adv = data.parseAdventurers(data.bookInfo(1).adventurers);
    ok('warrior combat=6', adv.professions.Warrior.combat === 6, JSON.stringify(adv.professions.Warrior));
    ok('start stamina=9', adv.stamina === 9);
    ok('start gold=16', adv.gold === 16);

    // create character
    const gs = GameState.create({ name:'Test', gender:'m', profession:'Warrior', book:1, adv });
    ok('combat ability=6', gs.ability('combat') === 6, String(gs.ability('combat')));
    ok('has armour+weapon+map', gs.itemCount() >= 3, 'items='+gs.itemCount());
    ok('armour bonus=1', gs.armourBonus() === 1);
    ok('defence=8 (6+1+1)', gs.defence() === 8, String(gs.defence()));

    // conditions
    gs.addCodeword('Assassin');
    ok('if codeword true', eng.evaluateCondition(parse('<if codeword="Assassin"/>'), gs));
    ok('if not codeword false', eng.evaluateCondition(parse('<if not="t" codeword="Assassin"/>'), gs) === false);
    ok('if missing codeword false', eng.evaluateCondition(parse('<if codeword="Nope"/>'), gs) === false);
    ok('if shards>=10 true', eng.evaluateCondition(parse('<if shards="10"/>'), gs));
    ok('if shards>=999 false', eng.evaluateCondition(parse('<if shards="999"/>'), gs) === false);
    ok('if profession warrior', eng.evaluateCondition(parse('<if profession="Warrior"/>'), gs));
    gs.setVar('x', 5);
    ok('if var equals', eng.evaluateCondition(parse('<if var="x" equals="5"/>'), gs));
    ok('if var greaterthan', eng.evaluateCondition(parse('<if var="x" greaterthan="4"/>'), gs));
    ok('if var lessthan false', eng.evaluateCondition(parse('<if var="x" lessthan="3"/>'), gs) === false);

    // effects
    const before = gs.data.shards;
    eng.applyEffect(parse('<lose shards="10"/>'), gs, {});
    ok('lose 10 shards', gs.data.shards === before - 10, String(gs.data.shards));
    eng.applyEffect(parse('<gain shards="5"/>'), gs, {});
    ok('gain 5 shards', gs.data.shards === before - 5);
    eng.applyEffect(parse('<tick codeword="Foo"/>'), gs, {});
    ok('tick codeword', gs.hasCodeword('Foo'));
    const cs = gs.ability('combat');
    eng.applyEffect(parse('<lose ability="combat" amount="1"/>'), gs, {});
    ok('lose 1 combat', gs.abilityNatural('combat') === 6-1, String(gs.abilityNatural('combat')));
    const st = gs.data.stamina;
    eng.applyEffect(parse('<lose stamina="3"/>'), gs, {});
    ok('lose 3 stamina', gs.data.stamina === st-3);

    // ranges
    ok('range 0-4 ~3', eng.matchRange('0-4', 3));
    ok('range 1,2 ~2', eng.matchRange('1,2', 2));
    ok('range 1,2 ~3 no', !eng.matchRange('1,2', 3));
    ok('range 11 ~11', eng.matchRange('11', 11));
    ok('range 14+ ~15', eng.matchRange('14+', 15));
    ok('range 2-10 ~1 no', !eng.matchRange('2-10', 1));

    // difficulty roll logic
    let sc=0; for (let i=0;i<200;i++){ const r=eng.rollDifficulty(gs,'combat',10,0); if (r.success !== (r.total>10)) sc++; if (r.dice.length!==2) sc+=100; }
    ok('difficulty roll consistent', sc===0, 'mismatches='+sc);

    // render representative sections
    const container = document.createElement('div');
    const story = new Story(container, gs, { navigate(){}, onDeath(){}, notify(){} });
    async function renderSec(b,s){ const el = await data.getSection(b,s); story.state=gs; story.begin(el,b,s); return container; }

    await renderSec(1,'1');
    ok('§1 renders prose', container.textContent.length > 200);
    ok('§1 has goto link', !!container.querySelector('.goto'));

    await renderSec(1,'10');
    ok('§10 has choices', container.querySelectorAll('.choice').length >= 5, 'choices='+container.querySelectorAll('.choice').length);

    await renderSec(1,'101');
    ok('§101 has roll button', !!container.querySelector('.btn-roll'));

    await renderSec(1,'105');
    ok('§105 has fight', !!container.querySelector('.fight'));

    await renderSec(1,'142');
    ok('§142 has market trades', container.querySelectorAll('.trade').length >= 3, 'trades='+container.querySelectorAll('.trade').length);

    await renderSec(1,'106');
    ok('§106 has roll (difficulty+outcomes)', !!container.querySelector('.btn-roll'));

    // combat terminates
    const fgEl = await data.getSection(1,'105');
    story.begin(fgEl,1,'105');
    const fightNode = fgEl.querySelector('fight');
    const fkey='fight@r'; // not used; call fightRound directly
    const fight = { name:'X', combat:5, defence:8, stamina:9, maxStamina:9, playerFirst:true, outcome:null, log:[] };
    let guard=0;
    while(!fight.outcome && !gs.isDead() && guard<500){ story.fightRound(fight, fightNode, null); guard++; }
    ok('combat terminates', (fight.outcome==='win'||gs.isDead()) && guard<500, 'guard='+guard+' outcome='+fight.outcome);

    // scan: render EVERY section of EVERY book without throwing
    let renderErrors = 0, firstErr='', total=0;
    const gs2 = GameState.create({ name:'Scan', gender:'m', profession:'Rogue', book:1, adv });
    const c2 = document.createElement('div');
    const story2 = new Story(c2, gs2, { navigate(){}, onDeath(){}, notify(){} });
    for (let b=1; b<=6; b++) {
      const raw = await data.loadBook(b);
      for (const key of Object.keys(raw)) {
        total++;
        try { const el = await data.getSection(b, key); story2.begin(el, b, key); }
        catch(e){ renderErrors++; if(!firstErr) firstErr = b+'§'+key+': '+(e.stack||e.message); }
      }
    }
    ok('all sections render w/o throw ('+total+')', renderErrors===0, renderErrors+' errors; first='+firstErr);

  } catch (e) {
    out.push('FATAL ' + (e.stack || e.message));
    fail++;
  }
  document.getElementById('results').textContent =
    `RESULT ${fail===0?'ALL PASS':'FAILURES'} pass=${pass} fail=${fail}\n` + out.join('\n');
  document.title = fail===0 ? 'TESTS_OK' : 'TESTS_FAIL';
}
run();
</script></body></html>
