<!doctype html><html><head><meta charset="utf-8"><title>FL tests</title></head>
<body><pre id="results">running…</pre>
<script>
  // Sticky-fatal bootstrap (task 82 + task 120 gaps a/b). Registered in a classic script
  // that runs BEFORE the module below, so it catches:
  //   • a parse-time SyntaxError in any suite module — most often a duplicate top-level
  //     const/let (e.g. "Identifier 'g53' has already been declared"). That aborts the
  //     module before main() runs, so without this the page would hang at "running…" and
  //     the headless smoke check would read it as a HANG, not a failure.
  //   • an async error or unhandled rejection thrown from exercised app code (a rejected
  //     un-awaited promise, a throw inside a setTimeout callback). These used to fail
  //     nothing, and a mid-run window 'error' that wrote RESULT FATAL was then overwritten
  //     by the reporter's unconditional final line — potentially as ALL PASS.
  // The fix: any capture sets a sticky window flag. The module reporter honours it and can
  // never report ALL PASS once it is set; a captured error that arrives after a PASS report
  // flips the title back to failure.
  window.__FL_ASYNC_FATAL__ = '';
  function flFatal(msg) {
    if (!window.__FL_ASYNC_FATAL__) window.__FL_ASYNC_FATAL__ = msg;
    var el = document.getElementById('results');
    if (document.title === 'TESTS_OK') {
      // The reporter already passed — a captured async error must flip the aggregate.
      document.title = 'TESTS_FAIL';
      if (el) el.textContent = 'RESULT FAILURES (async error after report) pass=? fail=1\nASYNC-FATAL ' + msg + '\n' + el.textContent;
    } else if (document.title !== 'TESTS_FAIL') {
      // Before the reporter runs — surface a provisional fatal so a hang reads as a failure.
      if (el) el.textContent = 'RESULT FATAL pass=0 fail=1\nFATAL ' + msg;
      document.title = 'TESTS_FAIL';
    }
    // If already TESTS_FAIL, keep the existing detailed failure report; the flag is set.
  }
  window.addEventListener('error', function (ev) {
    var where = ev.filename ? ' (' + String(ev.filename).split('/').pop() + ':' + ev.lineno + ')' : '';
    flFatal('uncaught error: ' + (ev.message || 'unknown error') + where);
  });
  window.addEventListener('unhandledrejection', function (ev) {
    var r = ev && ev.reason;
    flFatal('unhandled rejection: ' + ((r && (r.stack || r.message)) || String(r)));
  });
</script>
<script type="module">
import * as data from './js/data.js';
import { run as runEngine } from './tests/suite-engine.js';
import { run as runRender } from './tests/suite-render.js';
import { run as runInventory } from './tests/suite-inventory.js';
import { run as runCombat } from './tests/suite-combat.js';
import { run as runEconomy } from './tests/suite-economy.js';
import { run as runActions } from './tests/suite-actions.js';
import { run as runCorpus } from './tests/suite-corpus.js';

// The shared context every suite receives. Deliberately tiny: the reporting counters live
// here and each suite mutates them through ok(); parse() is the one shared XML helper.
const out = [];
let pass = 0, fail = 0, reported = false;
function ok(name, cond, extra = '') {
  if (cond) { pass++; out.push('PASS ' + name); }
  else {
    fail++; out.push('FAIL ' + name + (extra ? (' :: ' + extra) : ''));
    // A failure fired from un-awaited async work AFTER report() has printed would otherwise
    // only bump counters and an `out` array nobody re-reads — the RESULT line would stay
    // ALL PASS. Route it through the sticky-fatal path so the aggregate flips to failure. (task 143)
    if (reported) flFatal('post-report failure: ' + name + (extra ? (' :: ' + extra) : ''));
  }
}
function parse(xml) { return data.parseXml(xml); }
const ctx = { ok, parse };

// Suite order preserves the original single-scope execution order so the shared dice/RNG
// window state flows exactly as before; the six-book corpus scan runs LAST so "render every
// section of all six books" stays the final confidence check.
const suites = [
  ['engine',    runEngine],
  ['render',    runRender],
  ['inventory', runInventory],
  ['combat',    runCombat],
  ['economy',   runEconomy],
  ['actions',   runActions],
  ['corpus',    runCorpus],
];

// ?suite=combat (or a comma list) runs a focused subset in this same harness — each suite is
// self-contained (rebuilds its own fixtures) so a focused run is meaningful on its own.
const only = new URLSearchParams(location.search).get('suite');
const wanted = only ? only.split(',').map((s) => s.trim()).filter(Boolean) : null;

async function main() {
  for (const [name, fn] of suites) {
    if (wanted && !wanted.includes(name)) continue;
    // Suites drive the animated dice widget and assert on the resolved result synchronously,
    // so they assume instant-dice mode. In the aggregate an early suite establishes it and it
    // persists; setting it here as well lets any suite run hermetically in a focused ?suite= run.
    window.__FL_INSTANT_DICE__ = true;
    try {
      await fn(ctx);
    } catch (e) {
      fail++;
      out.push('FATAL [' + name + '] ' + ((e && (e.stack || e.message)) || String(e)));
    }
  }
  report();
}

function report() {
  const asyncFatal = window.__FL_ASYNC_FATAL__;
  if (asyncFatal && fail === 0) fail = 1;              // a captured async error fails the aggregate
  const passed = fail === 0 && !asyncFatal;
  const head = passed ? 'ALL PASS' : (pass === 0 && asyncFatal ? 'FATAL' : 'FAILURES');
  const lead = asyncFatal ? ['ASYNC-FATAL ' + asyncFatal] : [];
  document.getElementById('results').textContent =
    `RESULT ${head} pass=${pass} fail=${fail}\n` + lead.concat(out).join('\n');
  document.title = passed ? 'TESTS_OK' : 'TESTS_FAIL';
  reported = true;   // any later failing ok() must now route through flFatal (task 143)
}

main();
</script>
</body></html>
