<!doctype html><html><head><meta charset="utf-8"><title>FL tests</title></head>
<body><pre id="results">running…</pre>
<script type="module">
import * as data from './js/data.js';
import { GameState, readSlotData, importSave, loadSlotMeta, deleteSlot, makeItem } from './js/state.js';
import * as eng from './js/engine.js';
import { fightRound } from './js/combat.js';
import { Story } from './js/render.js';
import { Narrator } from './js/tts.js';
import { renderSheet } from './js/ui.js';

const out = [];
let pass = 0, fail = 0;
function ok(name, cond, extra='') { if (cond) { pass++; out.push('PASS ' + name); } else { fail++; out.push('FAIL ' + name + (extra?(' :: '+extra):'')); } }
function parse(xml){ return data.parseXml(xml); }

async function run() {
  try {
    await data.loadMeta();
    ok('meta books=6', data.availableBooks().length === 6);

    // adventurers
    const adv = data.parseAdventurers(data.bookInfo(1).adventurers);
    ok('warrior combat=6', adv.professions.Warrior.combat === 6, JSON.stringify(adv.professions.Warrior));
    ok('start stamina=9', adv.stamina === 9);
    ok('start gold=16', adv.gold === 16);

    // create character
    const gs = GameState.create({ name:'Test', gender:'m', profession:'Warrior', book:1, adv });
    ok('combat ability=6', gs.ability('combat') === 6, String(gs.ability('combat')));
    ok('has armour+weapon+map', gs.itemCount() >= 3, 'items='+gs.itemCount());
    ok('armour bonus=1', gs.armourBonus() === 1);
    ok('defence=8 (6+1+1)', gs.defence() === 8, String(gs.defence()));

    // conditions
    gs.addCodeword('Assassin');
    ok('if codeword true', eng.evaluateCondition(parse('<if codeword="Assassin"/>'), gs));
    ok('if not codeword false', eng.evaluateCondition(parse('<if not="t" codeword="Assassin"/>'), gs) === false);
    ok('if missing codeword false', eng.evaluateCondition(parse('<if codeword="Nope"/>'), gs) === false);
    ok('if shards>=10 true', eng.evaluateCondition(parse('<if shards="10"/>'), gs));
    ok('if shards>=999 false', eng.evaluateCondition(parse('<if shards="999"/>'), gs) === false);
    ok('if profession warrior', eng.evaluateCondition(parse('<if profession="Warrior"/>'), gs));
    gs.setVar('x', 5);
    ok('if var equals', eng.evaluateCondition(parse('<if var="x" equals="5"/>'), gs));
    ok('if var greaterthan', eng.evaluateCondition(parse('<if var="x" greaterthan="4"/>'), gs));
    ok('if var lessthan false', eng.evaluateCondition(parse('<if var="x" lessthan="3"/>'), gs) === false);

    // effects
    const before = gs.data.shards;
    eng.applyEffect(parse('<lose shards="10"/>'), gs, {});
    ok('lose 10 shards', gs.data.shards === before - 10, String(gs.data.shards));
    eng.applyEffect(parse('<gain shards="5"/>'), gs, {});
    ok('gain 5 shards', gs.data.shards === before - 5);
    eng.applyEffect(parse('<tick codeword="Foo"/>'), gs, {});
    ok('tick codeword', gs.hasCodeword('Foo'));
    const cs = gs.ability('combat');
    eng.applyEffect(parse('<lose ability="combat" amount="1"/>'), gs, {});
    ok('lose 1 combat', gs.abilityNatural('combat') === 6-1, String(gs.abilityNatural('combat')));
    const st = gs.data.stamina;
    eng.applyEffect(parse('<lose stamina="3"/>'), gs, {});
    ok('lose 3 stamina', gs.data.stamina === st-3);

    // ranges
    ok('range 0-4 ~3', eng.matchRange('0-4', 3));
    ok('range 1,2 ~2', eng.matchRange('1,2', 2));
    ok('range 1,2 ~3 no', !eng.matchRange('1,2', 3));
    ok('range 11 ~11', eng.matchRange('11', 11));
    ok('range 14+ ~15', eng.matchRange('14+', 15));
    ok('range 2-10 ~1 no', !eng.matchRange('2-10', 1));

    // difficulty roll logic
    let sc=0; for (let i=0;i<200;i++){ const r=eng.rollDifficulty(gs,'combat',10,0); if (r.success !== (r.total>10)) sc++; if (r.dice.length!==2) sc+=100; if (r.margin !== r.total-10) sc+=1000; }
    ok('difficulty roll consistent', sc===0, 'mismatches='+sc);

    // training rule (extracted to engine.rollTraining): success ⇒ +1 ability
    const gt = GameState.create({ name:'T', gender:'m', profession:'Warrior', book:1, adv });
    let tbad=0, tgain=0;
    for (let i=0;i<300;i++){ gt.data.abilities.combat=2; const r=eng.rollTraining(gt,'combat',2,0);
      if (r.success !== (r.total>2)) tbad++;
      if (r.success && gt.abilityNatural('combat')!==3) tbad++;
      if (r.success) tgain++; }
    ok('training: success flag = roll>natural', tbad===0, 'bad='+tbad);
    ok('training: +1 ability on success', tgain>0);

    // rank check rule (extracted to engine.rollRankCheck): success iff roll<=Rank
    const gk = GameState.create({ name:'K', gender:'m', profession:'Warrior', book:1, adv }); gk.data.rank=5;
    let kbad=0; for (let i=0;i<200;i++){ const r=eng.rollRankCheck(gk,1,0,0); if (r.success!==(r.total<=5)) kbad++; if (r.margin!==1+5-r.total) kbad++; }
    ok('rankcheck: success=roll<=Rank & margin', kbad===0, 'bad='+kbad);

    // resurrection deal (extracted to engine.buyResurrectionDeal)
    const gr = GameState.create({ name:'R', gender:'f', profession:'Priest', book:1, adv }); gr.data.shards=100;
    eng.buyResurrectionDeal(gr, { book:2, section:'50', text:'a deal', god:'Elnir', cost:30 });
    ok('resurrection: charges cost + records deal', gr.data.shards===70 && gr.hasResurrection() && gr.data.resurrections[0].section==='50', `sh=${gr.data.shards}`);

    // render representative sections
    const container = document.createElement('div');
    const story = new Story(container, gs, { navigate(){}, onDeath(){}, notify(){} });
    async function renderSec(b,s){ const el = await data.getSection(b,s); story.state=gs; story.begin(el,b,s); return container; }

    await renderSec(1,'1');
    ok('§1 renders prose', container.textContent.length > 200);
    ok('§1 has goto link', !!container.querySelector('.goto'));

    await renderSec(1,'10');
    ok('§10 has choices', container.querySelectorAll('.choice').length >= 5, 'choices='+container.querySelectorAll('.choice').length);

    await renderSec(1,'101');
    ok('§101 has roll button', !!container.querySelector('.btn-roll'));

    await renderSec(1,'105');
    ok('§105 has fight', !!container.querySelector('.fight'));

    await renderSec(1,'142');
    ok('§142 has market trades', container.querySelectorAll('.trade').length >= 3, 'trades='+container.querySelectorAll('.trade').length);

    await renderSec(1,'106');
    ok('§106 has roll (difficulty+outcomes)', !!container.querySelector('.btn-roll'));

    // --- interaction: click the roll, expect it to resolve to a Continue link ---
    container.querySelector('.btn-roll').click();
    await new Promise(r => setTimeout(r, 1000)); // let dice animation + rerender complete
    ok('§106 roll resolves to Continue', !!container.querySelector('.goto-primary') && !!container.querySelector('.die'),
       'html=' + container.innerHTML.slice(0, 160));

    // §101: difficulty with inline-goto success/failure branches
    await renderSec(1,'101');
    container.querySelector('.btn-roll').click();
    await new Promise(r => setTimeout(r, 1000));
    const prog101 = container.querySelector('.goto, .goto-primary');
    ok('§101 roll resolves to a goto', !!prog101 && !!container.querySelector('.die'),
       'HTML=' + container.querySelector('.flow').innerHTML.replace(/\s+/g,' ').slice(0, 400));

    // §120: random + outcome ranges (travel)
    await renderSec(1,'120');
    container.querySelector('.btn-roll').click();
    await new Promise(r => setTimeout(r, 1000));
    const prog120 = container.querySelector('.goto, .goto-primary');
    ok('§120 random resolves to a goto', !!prog120 && !!container.querySelector('.die'),
       'HTML=' + container.querySelector('.flow').innerHTML.replace(/\s+/g,' ').slice(0, 400));

    // --- interaction: clicking a choice navigates ---
    let navd = null;
    const story3 = new Story(container, gs, { navigate:(b,s)=>{navd={b,s};}, onDeath(){}, notify(){} });
    const s10 = await data.getSection(1,'10'); story3.begin(s10,1,'10');
    const firstChoice = Array.from(container.querySelectorAll('.choice')).find(c => !c.disabled);
    firstChoice.click();
    ok('choice click navigates', navd && String(navd.b)==='1', 'navd='+JSON.stringify(navd));

    // --- interaction: fight Attack click advances the fight ---
    const s105 = await data.getSection(1,'105'); story3.begin(s105,1,'105');
    const atk = container.querySelector('.fight .btn-roll');
    atk.click();
    await new Promise(r => setTimeout(r, 900));
    ok('fight attack produces a log line', container.querySelectorAll('.fight-log div').length >= 1,
       'log='+container.querySelectorAll('.fight-log div').length);

    // combat terminates
    const fgEl = await data.getSection(1,'105');
    story.begin(fgEl,1,'105');
    const fight = { name:'X', combat:5, defence:8, stamina:9, maxStamina:9, playerFirst:true, outcome:null, log:[] };
    let guard=0;
    while(!fight.outcome && !gs.isDead() && guard<500){ fightRound(gs, fight, null); guard++; }
    ok('combat terminates', (fight.outcome==='win'||gs.isDead()) && guard<500, 'guard='+guard+' outcome='+fight.outcome);

    // scan: render EVERY section of EVERY book without throwing
    let renderErrors = 0, firstErr='', total=0;
    const gs2 = GameState.create({ name:'Scan', gender:'m', profession:'Rogue', book:1, adv });
    const c2 = document.createElement('div');
    const story2 = new Story(c2, gs2, { navigate(){}, onDeath(){}, notify(){} });
    for (let b=1; b<=6; b++) {
      const raw = await data.loadBook(b);
      for (const key of Object.keys(raw)) {
        total++;
        try { const el = await data.getSection(b, key); story2.begin(el, b, key); }
        catch(e){ renderErrors++; if(!firstErr) firstErr = b+'§'+key+': '+(e.stack||e.message); }
      }
    }
    ok('all sections render w/o throw ('+total+')', renderErrors===0, renderErrors+' errors; first='+firstErr);

    // --- undo restores full state (incl. stamina), not just position ---
    const gu = GameState.create({ name:'U', gender:'m', profession:'Warrior', book:1, adv });
    gu.data.section='1'; gu.snapshot();          // entry of §1 (stamina 9)
    ok('cannot undo with 1 snapshot', gu.canUndo() === false);
    gu.damageStamina(5);                          // now 4
    gu.data.section='2'; gu.snapshot();          // entry of §2 (stamina 4)
    ok('can undo with 2 snapshots', gu.canUndo() === true);
    gu.damageStamina(100);                        // die
    ok('U is dead', gu.isDead());
    const ut = gu.undo();                         // restore entry of §1
    ok('undo returns to §1', ut && ut.section === '1', JSON.stringify(ut));
    ok('undo restores stamina to 9', gu.data.stamina === 9, String(gu.data.stamina));
    ok('undo clears death', gu.isDead() === false);

    // --- <group> is an OPTIONAL action: must not auto-apply on entry ---
    const gg = GameState.create({ name:'G', gender:'m', profession:'Warrior', book:1, adv });
    gg.data.shards = 100;
    const cg = document.createElement('div');
    const storyG = new Story(cg, gg, { navigate(){}, onDeath(){}, notify(){} });
    const s291 = await data.getSection(1,'291'); storyG.begin(s291,1,'291'); // become initiate of Elnir (60 shards)
    ok('§291 shows a group action', !!cg.querySelector('.group-action'));
    ok('§291 does NOT auto-join god', gg.hasGod('Elnir') === false);
    ok('§291 does NOT auto-charge', gg.data.shards === 100, String(gg.data.shards));
    cg.querySelector('.group-action').click();
    ok('§291 join applied on click', gg.hasGod('Elnir') === true);
    ok('§291 charged 60 on click', gg.data.shards === 40, String(gg.data.shards));

    // townhouse purchase (§10) must not auto-buy
    const gh = GameState.create({ name:'H', gender:'m', profession:'Warrior', book:1, adv });
    gh.data.shards = 300;
    const ch = document.createElement('div');
    const storyH = new Story(ch, gh, { navigate(){}, onDeath(){}, notify(){} });
    const s10b = await data.getSection(1,'10'); storyH.begin(s10b,1,'10');
    ok('§10 does NOT auto-buy townhouse', !gh.hasCodeword('1.10.1') && gh.data.shards === 300, `cw=${gh.hasCodeword('1.10.1')} sh=${gh.data.shards}`);

    // --- blessing purchase: "only one at a time" gate + storm/storms unify ----
    // §202 (Safety from Storms) / §271 (Luck) are temple buys via the price/flag
    // idiom: charge only on click, and refuse a re-buy once the blessing is held
    // (otherwise Shards are spent for nothing, as addBlessing dedupes).
    const gb = GameState.create({ name:'B', gender:'m', profession:'Warrior', book:2, adv });
    gb.data.shards = 100;
    const cb = document.createElement('div');
    const storyB = new Story(cb, gb, { navigate(){}, onDeath(){}, notify(){} });
    const s202 = await data.getSection(2,'202'); storyB.begin(s202,2,'202');
    ok('§202 shows a pay button', !!cb.querySelector('.pay-action'));
    ok('§202 does NOT auto-charge/grant', gb.data.shards === 100 && !gb.hasBlessing('storm'), `sh=${gb.data.shards}`);
    cb.querySelector('.pay-action').click();
    ok('§202 charged 20 (non-initiate) on click', gb.data.shards === 80, String(gb.data.shards));
    ok('§202 granted a single storm blessing', gb.hasBlessing('storm') && gb.data.blessings.length === 1, JSON.stringify(gb.data.blessings));
    // storm/storms are the same blessing — a book-1 <if blessing="storms"> must see it.
    ok('storm grant satisfies <if blessing="storms">', eng.evaluateCondition(parse('<if blessing="storms"/>'), gb));
    // Re-visit while owned → pay button disabled; no double-spend.
    const s202b = await data.getSection(2,'202'); storyB.begin(s202b,2,'202');
    const pay202 = cb.querySelector('.pay-action');
    ok('§202 re-buy blocked when owned', !!pay202 && pay202.disabled === true && /already have/i.test(pay202.title), pay202 ? `disabled=${pay202.disabled} title="${pay202.title}"` : 'no button');

    // §690: four blessings share one flag ("choose one") — never over-block just
    // because the player already holds one of the four abilities.
    const gm = GameState.create({ name:'M', gender:'m', profession:'Warrior', book:6, adv });
    gm.data.shards = 100; gm.addBlessing('combat');
    const cm = document.createElement('div');
    const storyM = new Story(cm, gm, { navigate(){}, onDeath(){}, notify(){} });
    const s690 = await data.getSection(6,'690'); storyM.begin(s690,6,'690');
    const pay690 = cm.querySelector('.pay-action');
    ok('§690 multi-blessing buy stays enabled', !!pay690 && pay690.disabled === false, pay690 ? `disabled=${pay690.disabled}` : 'no button');

    // --- §521: possession theft — item="?" wildcard + defer until the die rolls --
    // The thief steals 1-6 possessions; the count comes from a <random var="x"> that
    // must be rolled first. Before the fix, item="?" matched nothing AND the loss
    // auto-applied with x=0, so nothing was ever stolen.
    const g521 = GameState.create({ name:'T', gender:'m', profession:'Warrior', book:2, adv });
    for (const nm of ['rope','lantern','flask','gem','scroll','cloak']) g521.addItem(makeItem('item', nm));
    const initCount = g521.itemCount();
    const c521 = document.createElement('div');
    const story521 = new Story(c521, g521, { navigate(){}, onDeath(){}, notify(){} });
    const s521 = await data.getSection(2,'521'); story521.begin(s521,2,'521');
    ok('§521 steals nothing before the roll', g521.itemCount() === initCount, `count=${g521.itemCount()} init=${initCount}`);
    ok('§521 shows a roll button', !!c521.querySelector('.btn-roll'));
    c521.querySelector('.btn-roll').click();
    await new Promise(r => setTimeout(r, 1000));
    const stolen = g521.getVar('x');
    ok('§521 rolls 1-6 for the theft count', stolen >= 1 && stolen <= 6, 'x='+stolen);
    ok('§521 steals exactly the rolled number', g521.itemCount() === initCount - Math.min(stolen, initCount), `count=${g521.itemCount()} init=${initCount} x=${stolen}`);

    // --- possessions can be reordered (decides what a "listed first" theft takes) --
    const go = GameState.create({ name:'O', gender:'m', profession:'Warrior', book:1, adv });
    go.data.items = [];
    for (const nm of ['alpha','beta','gamma']) go.addItem(makeItem('item', nm));
    const order = () => go.data.items.map((i) => i.name).join(',');
    ok('reorder: initial order', order() === 'alpha,beta,gamma', order());
    ok('reorder: move up swaps with neighbour', (go.moveItem(go.data.items[2].id, -1), order() === 'alpha,gamma,beta'), order());
    ok('reorder: cannot move the first item up', go.moveItem(go.data.items[0].id, -1) === false && order() === 'alpha,gamma,beta');
    ok('reorder: cannot move the last item down', go.moveItem(go.data.items[2].id, 1) === false && order() === 'alpha,gamma,beta');
    ok('reorder: move down swaps with neighbour', (go.moveItem(go.data.items[0].id, 1), order() === 'gamma,alpha,beta'), order());
    const csheet = document.createElement('div');
    renderSheet(go, csheet);
    ok('sheet renders up/down controls per item', csheet.querySelectorAll('.item-move').length === go.data.items.length * 2, String(csheet.querySelectorAll('.item-move').length));
    ok('sheet disables the top-up and bottom-down controls', csheet.querySelectorAll('.item-move:disabled').length === 2, String(csheet.querySelectorAll('.item-move:disabled').length));

    // --- selling the starting "leather jerkin" at an armourer that lists "leather" --
    // Armour is valued by Defence tier, so the tier-1 jerkin sells at the "leather" row.
    const gsell = GameState.create({ name:'S', gender:'m', profession:'Warrior', book:1, adv });
    const startShards = gsell.data.shards;
    const hadJerkin = gsell.findItems('leather jerkin').length === 1;
    const csell = document.createElement('div');
    const storySell = new Story(csell, gsell, { navigate(){}, onDeath(){}, notify(){} });
    const s30 = await data.getSection(1,'30'); storySell.begin(s30,1,'30');
    const leatherRow = Array.from(csell.querySelectorAll('.trade')).find((r) => /^leather\b/i.test((r.querySelector('.trade-name')?.textContent || '')));
    const sellBtn = leatherRow && Array.from(leatherRow.querySelectorAll('button')).find((b) => /^Sell/.test(b.textContent));
    ok('§30 leather sell enabled for the starting jerkin', hadJerkin && !!sellBtn && !sellBtn.disabled, sellBtn ? `disabled=${sellBtn.disabled}` : 'no btn');
    sellBtn.click();
    ok('§30 selling removes the jerkin', gsell.findItems('leather jerkin').length === 0);
    ok('§30 selling credits 45 Shards', gsell.data.shards === startShards + 45, `sh=${gsell.data.shards} start=${startShards}`);

    // --- narration (TTS): sentence wrapping preserves interactivity ---
    const narrator = new Narrator();
    ok('TTS supported in test browser', narrator.supported === true);
    const gn = GameState.create({ name:'N', gender:'m', profession:'Warrior', book:1, adv });
    let navdN = null;
    const cn = document.createElement('div');
    const storyN = new Story(cn, gn, { navigate:(b,s)=>{navdN={b,s};}, onDeath(){}, notify(){}, onRender(){} });
    const s1n = await data.getSection(1,'1'); storyN.begin(s1n,1,'1');
    const flowN = cn.querySelector('.flow');
    const nChunks = narrator.prepare(flowN);
    ok('narration produces chunks', nChunks > 5, 'chunks='+nChunks);
    ok('narration wrapped sentences', flowN.querySelectorAll('.tts-s').length > 5);
    const glink = flowN.querySelector('.goto');
    ok('goto survives narration prep', !!glink);
    glink.click();
    ok('goto still navigates after prep (listeners preserved)', navdN && navdN.s === '20', JSON.stringify(navdN));
    const joined = narrator.chunks.map(c => c.text).join(' ');
    ok('narration excludes control labels', !/\b20\b/.test(joined));
    ok('narration includes prose', /dawn|sea|boat|Spider/i.test(joined));

    // --- save import/export round-trip ---
    const ge = GameState.create({ name:'Exportia', gender:'f', profession:'Mage', book:1, adv });
    ge.slot = 15; ge.data.shards = 777; ge.addCodeword('Exported'); ge.save();
    const exported = readSlotData(15);
    ok('export reads saved data', exported && exported.shards === 777 && exported.name === 'Exportia');
    const serialized = JSON.stringify(exported);            // what a downloaded file contains
    const { slot: impSlot, meta: impMeta } = importSave(JSON.parse(serialized));
    ok('import lands in a new slot', impSlot !== 15);
    ok('import preserves data', readSlotData(impSlot).shards === 777 && readSlotData(impSlot).codewords.Exported === true);
    ok('import meta name', impMeta.name === 'Exportia');
    let threw = false; try { importSave({ foo: 1 }); } catch { threw = true; }
    ok('import rejects invalid file', threw === true);
    deleteSlot(15); deleteSlot(impSlot); // cleanup

  } catch (e) {
    out.push('FATAL ' + (e.stack || e.message));
    fail++;
  }
  document.getElementById('results').textContent =
    `RESULT ${fail===0?'ALL PASS':'FAILURES'} pass=${pass} fail=${fail}\n` + out.join('\n');
  document.title = fail===0 ? 'TESTS_OK' : 'TESTS_FAIL';
}
run();
</script></body></html>
