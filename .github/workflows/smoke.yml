name: Smoke test

# Runs the headless smoke suite (web/_test.html) on every push and pull request.
# The suite exercises the rules engine and renders every section of all six books,
# so a regression that would only show up in the browser is caught in CI instead
# of shipping silently. No build toolchain is introduced — just Python's stdlib
# HTTP server and the Chrome that ubuntu-latest ships preinstalled.

on:
  push:
  pull_request:

jobs:
  # Guards the build scripts against the encoding trap that made build-data.ps1
  # unusable under Windows PowerShell 5.1 (task 121): a non-ASCII byte in the .ps1
  # source (an em dash in a double-quoted string) is misread through 5.1's legacy
  # code page and breaks parsing. This is a pure source check — it never runs the
  # engine-dependent build, so it can't "verify" engine-specific JSON/stamp output.
  build-scripts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build scripts stay ASCII-only and pin pwsh 7
        run: |
          set -euo pipefail
          fail=0
          for f in build/build-data.ps1 build/stamp-version.ps1; do
            if grep -nP '[^\x00-\x7F]' "$f"; then
              echo "✗ $f contains non-ASCII bytes (breaks Windows PowerShell 5.1 parsing)."
              fail=1
            fi
            if ! grep -q '^#Requires -Version 7.0' "$f"; then
              echo "✗ $f is missing the '#Requires -Version 7.0' guard."
              fail=1
            fi
          done
          if [ "$fail" -ne 0 ]; then exit 1; fi
          echo "✓ Build scripts are ASCII-only and require pwsh 7."

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render every section headlessly
        run: |
          set -euo pipefail
          # Serve the repo root; _test.html loads ./js and ./data relative to /web/.
          python3 -m http.server 8848 --directory "$GITHUB_WORKSPACE" &
          SERVER=$!
          trap 'kill "$SERVER" 2>/dev/null || true' EXIT
          # Wait for the server to accept connections before driving Chrome.
          for _ in $(seq 1 40); do
            if curl -sf http://localhost:8848/web/_test.html -o /dev/null; then break; fi
            sleep 0.5
          done

          DOM="$(mktemp)"
          UDD="$(mktemp -d)"   # a fresh profile so no stale service-worker cache can serve an old bundle
          google-chrome --headless=new --disable-gpu --no-sandbox \
            --no-first-run --no-default-browser-check \
            --dump-dom --virtual-time-budget=90000 \
            --user-data-dir="$UDD" \
            "http://localhost:8848/web/_test.html" > "$DOM" || true

          # Decide the verdict from the FIRST extracted result line only. --dump-dom
          # includes _test.html's inline script SOURCE, which carries the literal
          # "RESULT FATAL pass=0 fail=1" (the bootstrap's provisional-fatal string); a
          # whole-dump `grep -q 'RESULT FATAL'` therefore matched on every genuinely
          # failing run and misreported an ordinary assertion failure as a bootstrap
          # abort. The live verdict lives in <pre id="results"> at the very top of
          # <body>, so it is always the first match; the source literal only wins when
          # #results never populated — a true hang, correctly a FATAL. (task 142)
          echo "----- result -----"
          RESULT_LINE="$(grep -oE 'RESULT (ALL PASS|FAILURES|FATAL) pass=[0-9]+ fail=[0-9]+' "$DOM" | head -1 || true)"
          echo "${RESULT_LINE:-(no RESULT line — the suite did not run)}"
          case "$RESULT_LINE" in
            "RESULT ALL PASS"*)
              echo "✓ Smoke suite passed." ;;
            "RESULT FATAL"*)
              echo "✗ Smoke suite aborted before running (module parse/bootstrap error, e.g. a duplicate top-level const):"
              grep -oE 'FATAL [^<]{0,160}' "$DOM" | head -2 || true
              exit 1 ;;
            "RESULT FAILURES"*)
              echo "✗ Smoke suite failed. First FAIL lines:"
              grep -oE 'FAIL [^<]{0,160}' "$DOM" | head -50 || true
              exit 1 ;;
            *)
              echo "✗ No RESULT line — the suite did not run (server down, wrong path, or a hang)."
              exit 1 ;;
          esac
